<template>
    <lightning-card title="Property Management" icon-name="standard:home">
        <div class="slds-p-horizontal_medium slds-p-bottom_medium">
            <lightning-button-group>
                <lightning-button
                    label="View Properties"
                    icon-name="utility:list"
                    variant={listVariant}
                    onclick={showList}
                ></lightning-button>
                <lightning-button
                    label="New Property"
                    icon-name="utility:add"
                    variant={createVariant}
                    onclick={showCreate}
                ></lightning-button>
                <lightning-button
                    label="Dashboard"
                    icon-name="utility:chart"
                    variant={dashboardVariant}
                    onclick={showDashboard}
                ></lightning-button>
            </lightning-button-group>

            <div class="slds-m-top_medium">
                <template if:true={isMenu}>
                    <div class="slds-box slds-theme_shade slds-text-align_center slds-p-around_large">
                        <p class="slds-text-heading_small">Welcome to Property Management</p>
                        <p class="slds-text-color_weak slds-m-top_x-small">
                            Choose an action above to view properties, create a new property, or open the dashboard.
                        </p>
                    </div>
                </template>

                <template if:true={isList}>
                    <c-property-list></c-property-list>
                </template>

                <template if:true={isCreate}>
                    <c-property-create></c-property-create>
                </template>

                <template if:true={isDashboard}>
                    <div class="slds-box slds-theme_shade slds-p-around_large">
                        <p class="slds-text-heading_small">Dashboard</p>
                        <p class="slds-text-color_weak slds-m-top_x-small">
                            Leases expiring in 30 days, maintenance requests by status, and occupancy rate.
                        </p>
                        <template if:true={hasDashboard}>
                            <div class="slds-m-top_medium">
                                <lightning-button
                                    variant="brand"
                                    label="Open Dashboard"
                                    icon-name="utility:chart"
                                    onclick={openDashboard}
                                ></lightning-button>
                            </div>
                        </template>
                        <template if:false={hasDashboard}>
                            <p class="slds-text-color_weak slds-m-top_x-small">
                                Set the Dashboard Id in this component's properties (Lightning App Builder) to enable the link.
                            </p>
                        </template>
                    </div>
                </template>
            </div>
        </div>
    </lightning-card>
</template>
